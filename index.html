<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stack Cartoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="perfectFlash"></div>

    <audio id="musicaFundo" src="musica.mp3" loop></audio>

    <div id="score" style="display: none;">Score: 0</div>

    <div id="telaInicial">
        <h1 class="titulo-jogo">STACK</h1>
        <div id="recordeText">Recorde: 0</div>
        <button id="startBtn">JOGAR</button>
    </div>

    <button id="restartBtn" style="display: none;">Jogar Novamente</button>

    <div id="telaGameOver">
    <div class="gameover-card">
        <h1 class="gameover-title">FIM DE JOGO</h1>
        <p id="subtituloGameOver" class="gameover-subtitle">Você errou o bloco!</p>
        
        <div class="score-box">
            <div id="finalScore" class="score-box-final">Pontuação: 0</div>
            <div id="finalRecorde" class="score-box-record">Recorde: 0</div>
        </div>

            <button id="restartBtnNovo">
                JOGAR DE NOVO
            </button>
        </div>
    </div>


    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
